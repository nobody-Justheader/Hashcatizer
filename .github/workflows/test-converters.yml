name: Test Converters (Manual)

on:
  workflow_dispatch:
    inputs:
      converter:
        description: 'Specific converter to test (leave empty for all)'
        required: false
        default: ''

jobs:
  test-converters:
    name: Full Converter Smoke Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ubuntu-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Verify all converters are listed
        run: |
          BIN=./target/x86_64-unknown-linux-musl/release/hashcatizer
          COUNT=$($BIN --list 2>/dev/null | grep -c "^  ")
          echo "Converters listed: $COUNT"
          [ "$COUNT" -ge 80 ] || (echo "Converter count too low" && exit 1)

      - name: Test hash identification
        run: |
          BIN=./target/x86_64-unknown-linux-musl/release/hashcatizer
          check() {
            local hash="$1" expected="$2"
            OUT=$($BIN "$hash" 2>/dev/null)
            echo "$OUT" | grep -qi "$expected" && echo "  PASS: $expected" || (echo "  FAIL: $expected not in: $OUT" && exit 1)
          }
          check '$2a$12$LlMILsdbh1gAdLhWBXWzXuaLOhJuIqfA.FGy3j5L4t4L4t4L4t4L4' 'bcrypt'
          check '$1$salt$abcdefghijklmnopqrstu1' 'md5crypt'
          check '$6$rounds=5000$salt$AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA' 'sha512crypt'
          check '$krb5tgs$23$USER$REALM$hash' 'kerberos'

      - name: Test explicit converter (SSH key fixture)
        run: |
          BIN=./target/x86_64-unknown-linux-musl/release/hashcatizer
          ssh-keygen -t rsa -b 2048 -f /tmp/test_rsa -N "testpassword" -q
          OUT=$($BIN ssh /tmp/test_rsa 2>/dev/null)
          echo "SSH output: $OUT"
          echo "$OUT" | grep -q '^\$sshng\$' || (echo "SSH converter produced unexpected output" && exit 1)
          echo "  PASS: SSH key extracted"

      - name: Test specific converter (if input provided)
        if: inputs.converter != ''
        run: |
          BIN=./target/x86_64-unknown-linux-musl/release/hashcatizer
          echo "Testing converter: ${{ inputs.converter }}"
          $BIN --list 2>/dev/null | grep -q "  ${{ inputs.converter }}" \
            && echo "  PASS: ${{ inputs.converter }} is registered" \
            || (echo "  FAIL: ${{ inputs.converter }} not found in --list" && exit 1)
